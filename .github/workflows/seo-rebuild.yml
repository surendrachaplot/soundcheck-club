# Daily SEO rebuild — regenerates the pre-rendered static pages against the live API
# and commits them to THIS repo (soundcheck-club → GitHub Pages). Keeps the
# date-relative pages fresh: adds the new far /<city>/<date>/ page, drops the day
# that fell off, repoints /<city>/tonight/, refreshes line-ups everywhere.
#
# Token-free: the built-in GITHUB_TOKEN (contents: write) pushes this repo, and the
# build scripts come from the PUBLIC soundcheck-api repo (cloned anonymously). Only
# build-seo runs (not build-club) — the app shell only changes on a manual SPA deploy.
name: SEO rebuild (daily)

on:
  schedule:
    - cron: "17 5 * * *" # 05:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: seo-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout soundcheck-club (this repo, deploy target)
        uses: actions/checkout@v4
        with:
          path: soundcheck-club

      - name: Clone soundcheck-api (public — build scripts)
        run: git clone --depth 1 https://github.com/surendrachaplot/soundcheck-api.git soundcheck-api

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate SEO pages (against live API)
        working-directory: soundcheck-api
        run: node build-seo.mjs

      - name: Commit & push if anything changed
        working-directory: soundcheck-club
        run: |
          git config user.name "soundcheck-bot"
          git config user.email "soundcheck-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "chore(seo): daily rebuild $(date -u +%F)"
            git push
          fi
